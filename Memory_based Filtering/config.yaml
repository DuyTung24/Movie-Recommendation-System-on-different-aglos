# =====================================================================
# HỆ THỐNG CẤU HÌNH KHUYẾN NGHỊ PHIM MOVIELENS 1M
# =====================================================================

# 1. Cấu hình Đường dẫn (Paths)
storage:
  data_dir: "./data/ml-1m"
  checkpoint_dir: "./checkpoints"

# 2. Luồng thực thi hệ thống (Execution Flow)
execution:
  seed: 42

# 3. Tham số siêu tham số của Mô hình (Model Hyperparameters)
model:
  cf_mode: "user"        # Chế độ lọc cộng tác: 'item' hoặc 'user'
  n_neighbors: 30        # Số lượng lân cận (K-NN) để tính toán dự đoán

# 4. Cấu hình Đánh giá & Kiểm định (Evaluation Metrics)
evaluation:
  top_k: 10               # Mốc K cho các chỉ số Ranking (Precision@K, Recall@K, NDCG@K, MRR@K)
  n_negatives: 99        # Số lượng mẫu âm (Negative samples) ngẫu nhiên cho mỗi user khi test